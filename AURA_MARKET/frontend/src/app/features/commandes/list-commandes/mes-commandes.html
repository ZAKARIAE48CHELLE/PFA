<div class="container py-5 animate-fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-bag-check-fill text-primary me-2"></i> Mes Commandes</h2>
        <a routerLink="/dashboard" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Retour au Dashboard
        </a>
    </div>

    <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Chargement de vos transactions...</p>
    </div>

    <div *ngIf="error" class="alert alert-danger shadow-sm">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
    </div>

    <div *ngIf="!loading && !error" class="commandes-grid">
        <div *ngIf="commandes.length === 0" class="text-center py-5 am-card">
            <i class="bi bi-cart-x display-1 text-muted opacity-25"></i>
            <h4 class="mt-3">Aucune commande trouvée</h4>
            <p class="text-muted">Vous n'avez pas encore effectué d'achats.</p>
            <a routerLink="/list-produit" class="btn btn-primary mt-3">Découvrir les produits</a>
        </div>

        <div *ngFor="let c of commandes" class="commande-card am-card mb-3 p-3 animate-slide-in-up">
            <div class="row align-items-center">
                <div class="col-md-2">
                    <div class="ref-badge">
                        <small class="text-muted">Référence</small>
                        <div class="fw-bold">{{ c.reference }}</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <small class="text-muted">Date</small>
                    <div>{{ c.dateCommande | date:'mediumDate' }}</div>
                </div>
                <div class="col-md-2">
                    <small class="text-muted">Montant</small>
                    <div class="fw-bold text-primary">{{ c.prixFinal }} €</div>
                </div>
                <div class="col-md-3">
                    <span class="badge rounded-pill px-3" [ngClass]="getStatutBadgeClass(c.statut)">
                        {{ c.statut }}
                    </span>
                </div>
                <div class="col-md-2 text-end">
                    <button [routerLink]="['/commandes', c.id]" class="btn btn-light btn-sm rounded-circle">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
